name: Test

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: bejundas_test_db
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y default-libmysqlclient-dev pkg-config

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Lint (ruff)
        run: ruff check .

      - name: Format check (black)
        run: black --check .

      - name: Wait for MySQL
        run: |
          for i in {1..30}; do
            if mysqladmin ping -h 127.0.0.1 -uroot -proot --silent; then
              echo "MySQL is up"
              break
            fi
            echo "Waiting for MySQL..."
            sleep 2
          done

      - name: Run tests
        run: pytest --tb=short
        env:
          DJANGO_SETTINGS_MODULE: config.settings.ci
          DB_NAME: bejundas_test_db
          DB_USER: root
          DB_PASS: root
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          SECRET_KEY: ci-test-secret-key-not-real
          ALLOWED_HOSTS: localhost,127.0.0.1,bejundas.local,.bejundas.local
          PARENT_HOST: bejundas.local
          DEBUG: 'False'
          EMAIL_HOST: localhost
          EMAIL_PORT: '25'
          EMAIL_USE_TLS: 'False'
          EMAIL_HOST_USER: ''
          EMAIL_HOST_PASSWORD: ''
          DEFAULT_FROM_EMAIL: ci@bejundas.local
          CONTACT_EMAIL: ci@bejundas.local
          LEADS_EMAIL: ci@bejundas.local
