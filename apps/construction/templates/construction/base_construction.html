{% extends "core/base.html" %}
{% load static %}

{% block og_image %}{% static 'construction/images/banner-1.jpg' %}{% endblock %}

{% block navbar %}{% include "construction/navbar.html" %}{% endblock %}

{% block demo_css %}
<link rel="stylesheet" type="text/css" href="{% static 'construction/css/construction.css' %}">
<style>
  /* ── Construction brand palette ────────────────────────────────── */
  :root {
    --construction-primary: #2c2c2c;
    --construction-accent:  #f47920;
    --construction-accent-d:#d96710;
    --construction-soft:    #fff4ec;
    --construction-dark:    #1a1a1a;
    --construction-muted:   #666;
    --construction-border:  #eaeaea;
    --construction-bg:      #fafafa;
  }

  /* ── Navbar — override Viora construction.css demo-header (which
       assumes a dark header). Our core/navbar.html uses a light
       header (.header.style-default). ─────────────────────────────── */
  .header.style-default .main-menu .navigation > li > a,
  .header.style-default .navigation li > a {
      color: var(--construction-primary) !important;
  }
  .header.style-default .main-menu .navigation > li > a:hover,
  .header.style-default .navigation li:hover > a,
  .header.style-default .navigation li.active > a,
  .header.style-default .main-menu .current-menu > a,
  .header.style-default .main-menu .current-menu-item > a {
      color: var(--construction-accent) !important;
  }
  .header.style-default .navigation li.has-child::after,
  .header.style-default .main-menu .navigation > li:hover::after,
  .header.style-default .main-menu .current-menu::after,
  .header.style-default .main-menu .current-menu-item::after {
      color: var(--construction-primary);
  }
  .header.style-default .tf-btn {
      background: var(--construction-accent);
      color: #fff;
  }
  .header.style-default .tf-btn:hover {
      background: var(--construction-accent-d);
  }
  .header.style-default .burger span {
      background: var(--construction-primary);
  }

  /* ── Layout primitives shared across construction pages ─────────── */
  .c-container { max-width: 1200px; margin: 0 auto; padding: 0 24px; }
  .c-row { display: flex; flex-wrap: wrap; gap: 24px; }
  .c-col-4 { flex: 1 1 calc(25% - 18px); min-width: 220px; }
  .c-col-3 { flex: 1 1 calc(33.333% - 16px); min-width: 260px; }
  .c-col-2 { flex: 1 1 calc(50% - 12px); min-width: 320px; }

  /* Sections */
  .c-section { padding: 90px 0; }
  .c-section-soft { background: var(--construction-soft); }
  .c-section-dark { background: var(--construction-primary); color: #fff; }
  .c-eyebrow { display: inline-block; color: var(--construction-accent); font-size: 12px;
    font-weight: 700; letter-spacing: .12em; text-transform: uppercase; margin-bottom: 14px; }
  .c-section-title { font-size: clamp(28px, 4vw, 40px); font-weight: 800;
    color: var(--construction-primary); line-height: 1.2; letter-spacing: -.015em; margin-bottom: 18px; }
  .c-section-dark .c-section-title { color: #fff; }
  .c-section-sub { font-size: 16px; color: #555; line-height: 1.7; max-width: 640px; }
  .c-section-dark .c-section-sub { color: #cbd5e1; }

  /* Buttons */
  .c-btn { display: inline-flex; align-items: center; gap: 8px; padding: 14px 28px;
    font-size: 14px; font-weight: 700; letter-spacing: .03em; border-radius: 4px;
    text-transform: uppercase; text-decoration: none; transition: all .2s; border: none; cursor: pointer; }
  .c-btn-primary { background: var(--construction-accent); color: #fff; }
  .c-btn-primary:hover { background: var(--construction-accent-d); color: #fff; transform: translateY(-2px); }
  .c-btn-ghost { background: transparent; color: #fff; border: 2px solid #fff; }
  .c-btn-ghost:hover { background: #fff; color: var(--construction-primary); }
  .c-btn-outline { background: transparent; color: var(--construction-primary); border: 2px solid var(--construction-primary); }
  .c-btn-outline:hover { background: var(--construction-primary); color: #fff; }

  /* Page hero — slim version for inner pages */
  .c-page-hero { position: relative; min-height: 320px;
    background: linear-gradient(135deg, rgba(26,26,26,.85) 0%, rgba(44,44,44,.7) 100%),
                url("{% static 'construction/images/banner-1.jpg' %}") center/cover no-repeat;
    display: flex; align-items: center;
    padding: 160px 0 60px;
    color: #fff;
  }
  .c-page-hero .c-eyebrow { color: var(--construction-accent); }
  .c-page-hero h1 { color: #fff; font-size: clamp(34px, 4.5vw, 50px); font-weight: 800;
    line-height: 1.15; letter-spacing: -.02em; margin: 0; }

  /* Service card (re-used on home & services pages) */
  .c-service-card { background: #fff; border: 1px solid var(--construction-border); border-radius: 6px;
    padding: 32px 26px; height: 100%; transition: all .25s; border-top: 3px solid transparent; }
  .c-service-card:hover { border-top-color: var(--construction-accent);
    box-shadow: 0 12px 36px rgba(0,0,0,.08); transform: translateY(-4px); }
  .c-service-icon { width: 56px; height: 56px; background: var(--construction-soft);
    border-radius: 8px; display: flex; align-items: center; justify-content: center;
    color: var(--construction-accent); font-size: 28px; margin-bottom: 20px; }
  .c-service-card h3 { font-size: 18px; font-weight: 700; color: var(--construction-primary); margin-bottom: 10px; }
  .c-service-card p { font-size: 14px; color: var(--construction-muted); line-height: 1.6; margin: 0; }

  /* Project card */
  .c-project-card { position: relative; overflow: hidden; border-radius: 6px; height: 280px;
    background: var(--construction-bg); display: block; text-decoration: none; }
  .c-project-card img { width: 100%; height: 100%; object-fit: cover; transition: transform .4s; }
  .c-project-card:hover img { transform: scale(1.06); }
  .c-project-card .overlay { position: absolute; inset: 0;
    background: linear-gradient(180deg, transparent 40%, rgba(26,26,26,.92) 100%);
    display: flex; flex-direction: column; justify-content: flex-end; padding: 24px; color: #fff; }
  .c-project-card .sector { display: inline-block; background: var(--construction-accent); color: #fff;
    font-size: 10px; font-weight: 700; letter-spacing: .1em; text-transform: uppercase;
    padding: 3px 8px; border-radius: 3px; margin-bottom: 8px; align-self: flex-start; }
  .c-project-card .ptitle { font-size: 18px; font-weight: 700; line-height: 1.3; margin: 0; color: #fff; }
  .c-project-card .pmeta { font-size: 12px; color: #cbd5e1; margin-top: 4px; }
  .c-project-card.placeholder { background: #1a1a1a; display: flex; align-items: center; justify-content: center;
    color: #475569; font-size: 12px; letter-spacing: .1em; text-transform: uppercase; }

  /* Filter chips (projects page) */
  .c-filter-row { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 36px; justify-content: center; }
  .c-filter-chip { display: inline-flex; padding: 9px 18px; font-size: 13px; font-weight: 600;
    border-radius: 24px; border: 1.5px solid var(--construction-border); color: var(--construction-primary);
    background: #fff; text-decoration: none; transition: all .2s; }
  .c-filter-chip:hover { border-color: var(--construction-accent); color: var(--construction-accent); }
  .c-filter-chip.active { background: var(--construction-primary); color: #fff; border-color: var(--construction-primary); }

  /* Stat strip */
  .c-stat-strip { background: var(--construction-primary); color: #fff; padding: 36px 0; }
  .c-stat-strip .stat { text-align: center; padding: 12px; }
  .c-stat-strip .stat .num { font-size: 42px; font-weight: 800; color: var(--construction-accent); line-height: 1; }
  .c-stat-strip .stat .lbl { font-size: 13px; color: #cbd5e1; letter-spacing: .05em; text-transform: uppercase; margin-top: 8px; }

  /* CTA banner */
  .c-cta-banner { background: linear-gradient(135deg, var(--construction-primary) 0%, #3d3d3d 100%);
    color: #fff; padding: 60px 40px; border-radius: 8px; text-align: center; position: relative; overflow: hidden; }
  .c-cta-banner::before { content: ''; position: absolute; right: -60px; top: -60px;
    width: 240px; height: 240px; background: var(--construction-accent); opacity: .12; border-radius: 50%; }
  .c-cta-banner h2 { font-size: clamp(24px, 3.5vw, 34px); font-weight: 800; margin-bottom: 12px; position: relative; color: #fff; }
  .c-cta-banner p { color: #cbd5e1; font-size: 15px; margin-bottom: 24px; position: relative; max-width: 580px; margin-left: auto; margin-right: auto; }
  .c-cta-banner .c-btn-primary { position: relative; }

  /* Coming soon mini-card */
  .c-coming-soon { text-align: center; padding: 50px 30px; background: var(--construction-bg);
    border: 1px dashed #d4d4d4; border-radius: 6px; }
  .c-coming-soon .badge-soon { display: inline-block; background: var(--construction-accent);
    color: #fff; font-size: 11px; font-weight: 700; letter-spacing: .1em; text-transform: uppercase;
    padding: 4px 10px; border-radius: 3px; margin-bottom: 14px; }
  .c-coming-soon p { font-size: 14px; color: var(--construction-muted); margin: 0; }

  /* Forms */
  .c-form-grid { display: grid; gap: 18px; }
  .c-form-grid.cols-2 { grid-template-columns: 1fr 1fr; }
  .c-form-field label { display: block; font-size: 13px; font-weight: 600; color: var(--construction-primary); margin-bottom: 6px; text-transform: uppercase; letter-spacing: .04em; }
  .c-form-field input, .c-form-field textarea, .c-form-field select {
    width: 100%; padding: 12px 14px; font-size: 14px; border: 1.5px solid var(--construction-border);
    border-radius: 4px; background: #fff; color: var(--construction-primary); font-family: inherit; }
  .c-form-field input:focus, .c-form-field textarea:focus, .c-form-field select:focus {
    outline: none; border-color: var(--construction-accent); }
  .c-form-field textarea { min-height: 140px; resize: vertical; }
  .c-form-field .errors { color: #b91c1c; font-size: 12px; margin-top: 4px; }
  .c-form-success { background: #dcfce7; border: 1px solid #86efac; color: #166534;
    padding: 16px 20px; border-radius: 6px; margin-bottom: 20px; font-size: 14px; font-weight: 600; }

  /* Certification badge strip */
  .c-cert-strip { display: flex; flex-wrap: wrap; gap: 14px; justify-content: center; margin-top: 30px; }
  .c-cert-badge { background: #fff; border: 1px solid var(--construction-border); padding: 14px 22px;
    border-radius: 6px; min-width: 220px; text-align: center; }
  .c-cert-badge .cert-name { font-size: 14px; font-weight: 700; color: var(--construction-primary); margin: 0; }
  .c-cert-badge .cert-meta { font-size: 12px; color: var(--construction-muted); margin-top: 4px; }

  /* ── Responsive ──────────────────────────────────────────────── */

  /* Tablet (768px and below) */
  @media (max-width: 768px) {
    .c-section { padding: 60px 0; }
    .c-form-grid.cols-2 { grid-template-columns: 1fr; }
    .c-page-hero { padding: 130px 0 50px; min-height: 260px; }
    .c-row { gap: 16px; }
    .c-cta-banner { padding: 40px 24px; }
    .c-stat-strip .stat .num { font-size: 32px; }
    .c-filter-row { gap: 8px; margin-bottom: 24px; }
    .c-filter-chip { padding: 7px 14px; font-size: 12px; }
  }

  /* Mobile (480px and below) */
  @media (max-width: 480px) {
    .c-container { padding: 0 16px; }
    .c-section { padding: 48px 0; }
    .c-section-title { font-size: 22px; }
    .c-page-hero { padding: 110px 0 40px; min-height: 220px; }
    .c-page-hero h1 { font-size: 26px; }
    .c-col-4, .c-col-3, .c-col-2 { flex: 1 1 100%; min-width: 0; }
    .c-service-card { padding: 24px 20px; }
    .c-project-card { height: 220px; }
    .c-cta-banner h2 { font-size: 22px; }
    .c-cta-banner p { font-size: 14px; }
    .c-btn { padding: 12px 22px; font-size: 13px; }
    .c-stat-strip .stat .num { font-size: 28px; }
    .c-stat-strip .stat .lbl { font-size: 11px; }
  }
</style>
{% endblock %}
