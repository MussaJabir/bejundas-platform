[tool.black]
line-length = 100
target-version = ["py311"]
extend-exclude = '''
/(
    migrations
  | \.git
  | \.venv
  | venv
  | public
  | static/viora
)/
'''

[tool.ruff]
line-length = 100
target-version = "py311"
extend-exclude = [
    "migrations",
    "public",
    "static/viora",
    "venv",
    ".venv",
]

[tool.ruff.lint]
select = [
    "E",    # pycodestyle errors
    "F",    # pyflakes
    "W",    # pycodestyle warnings
    "I",    # isort
    "B",    # flake8-bugbear
    "C4",   # flake8-comprehensions
    "DJ",   # flake8-django
    "UP",   # pyupgrade
]
ignore = [
    "E501",  # line too long (black handles this)
    "B008",  # function calls in defaults (Django patterns)
]

[tool.ruff.lint.per-file-ignores]
"**/tests/**" = ["E501", "F841"]
"**/settings/*.py" = ["F405", "F403"]
"**/migrations/*.py" = ["E501"]

[tool.ruff.lint.isort]
known-first-party = ["apps", "config"]

[tool.coverage.run]
source = ["apps"]
omit = [
    "*/migrations/*",
    "*/tests/*",
    "*/admin.py",
    "*/apps.py",
    "manage.py",
]

[tool.coverage.report]
exclude_lines = [
    "pragma: no cover",
    "def __repr__",
    "raise NotImplementedError",
    "if TYPE_CHECKING:",
]
