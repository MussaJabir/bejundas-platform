{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>500 — Server Error | Bejundas Group</title>
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
    <link rel="icon" type="image/svg+xml" href="{% static 'images/brand/favicon.svg' %}">
    <link rel="shortcut icon" href="{% static 'images/brand/favicon.ico' %}">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #ffffff;
            color: #2c2c2c;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 2rem;
            text-align: center;
        }
        .logo { margin-bottom: 2.5rem; }
        .logo img { height: 48px; width: auto; }
        .code {
            font-size: 6rem;
            font-weight: 700;
            color: #1a1a2e;
            line-height: 1;
            margin-bottom: 1rem;
        }
        h1 { font-size: 1.5rem; font-weight: 600; margin-bottom: 0.75rem; color: #1a1a2e; }
        p { font-size: 1rem; color: #6b7280; max-width: 480px; line-height: 1.6; margin-bottom: 2rem; }
        .btn {
            display: inline-block;
            background: #1a1a2e;
            color: #ffffff;
            text-decoration: none;
            padding: 0.85rem 2rem;
            border-radius: 4px;
            font-size: 0.9rem;
            font-weight: 500;
            transition: background 0.2s;
        }
        .btn:hover { background: #2563eb; }
        .divider { width: 48px; height: 3px; background: #e94560; margin: 1.5rem auto; border-radius: 2px; }
    </style>
</head>
<body>
    <div class="logo">
        <img src="{% static 'images/brand/logo-wordmark.svg' %}" alt="Bejundas Group of Companies">
    </div>
    <div class="code">500</div>
    <div class="divider"></div>
    <h1>Something Went Wrong</h1>
    <p>We encountered an unexpected error on our end. Our team has been notified. Please try again in a moment.</p>
    <a href="/" class="btn">Back to Home</a>
</body>
</html>
